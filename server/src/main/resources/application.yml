spring:
  application:
    name: battle-royale-server
  # H2 en memoria con nombre fijo (DB_CLOSE_DELAY=-1: no se borra entre conexiones del pool).
  datasource:
    url: jdbc:h2:mem:battleroyaledb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
  # El esquema lo maneja Flyway (V1__), NUNCA Hibernate: ddl-auto=none evita el drift entre lo que
  # Hibernate "cree" que existe y lo que Flyway realmente creo.
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
    locations: classpath:db/migration
  # Jackson 3 serializa java.time.* como ISO-8601 por defecto (sin datatype JSR-310 aparte);
  # "write-dates-as-timestamps" ya no existe como SerializationFeature y rompe el binding si se
  # declara. Solo time-zone hace falta (fechas-argentina-fullstack).
  jackson:
    time-zone: America/Argentina/Buenos_Aires

# Constantes de gameplay (PLAN §1.3). Tunables por configuracion, jamas hardcodeadas en el codigo.
# Las que el cliente necesita (tickRate, snapshotRate, mundo, velocidadJugador) viajan en BIENVENIDA.
juego:
  tick-rate: 30                 # ticks/s; dt fijo = 1/tickRate. El loop nunca usa reloj de pared
  snapshot-rate: 15             # snapshots/s (1 cada 2 ticks). El cliente interpola
  jugadores-por-partida: 10     # humanos + bots hasta completar
  mundo: 256                    # mundo cuadrado de 256 x 256 unidades (1u ~ 1m)
  radio-jugador: 0.5            # colision circular
  velocidad-jugador: 5.0        # u/s; clampeada SIEMPRE server-side (anti speed-hack)
  vida: 100                     # HP inicial

  # Matchmaking (F6). Cola de espera: al llenar jugadores-por-partida o vencer el timeout, se crea
  # la partida rellenando el resto con bots (R6).
  matchmaking:
    timeout-segundos: 10

  # Ciclo de partida (F4/F6).
  lobby-timeout-segundos: 5
  cuenta-regresiva-segundos: 3
  gracia-fin-segundos: 10

  # Zona segura (F4). Ritmo total aproximado: espera + fases*(contraccion+espera) ~ 190s (~3 min).
  # Todo configurable — "seleccionar el tiempo de partida" es cambiar estos numeros, no el codigo.
  zona-radio-inicial: 100.0
  zona-radio-minimo: 15.0
  zona-cantidad-fases: 5
  zona-contraccion-segundos: 20
  zona-espera-segundos: 15
  zona-danio-por-segundo: 5.0

  # Auth (F5). El secret de dev NUNCA se usa en produccion (ahi viene de una variable de entorno).
  jwt:
    secret: "cambiame-en-produccion-esto-es-solo-para-desarrollo-local-1234567890"
    access-minutos: 15
    refresh-dias: 30

  # Rate limit simple en memoria para /api/auth/login (MVP, no distribuido: alcanza para una
  # sola instancia de dev/personal; una libreria como bucket4j seria sobre-ingenieria aca).
  rate-limit:
    intentos-maximos: 5
    ventana-minutos: 15

server:
  port: 8080
